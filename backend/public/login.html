<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediaNest — Log in</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #1a2e1a;
      --bg-secondary: #1e3320;
      --bg-card: #243726;
      --bg-card-hover: #2d4530;
      --text-primary: #e8e4d9;
      --text-secondary: #b8b4a4;
      --text-muted: #8a8672;
      --accent-green: #7cb87c;
      --accent-sage: #a3b890;
      --accent-gold: #d4a76a;
      --accent-warm: #e0c097;
      --accent-cream: #f5edd6;
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-leaf: rgba(124, 184, 124, 0.15);
      --glow-green: rgba(124, 184, 124, 0.08);
      --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.25);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --radius-xl: 28px;
      --font-heading: "Playfair Display", Georgia, serif;
      --font-body: "Inter", -apple-system, sans-serif;
      --transition-fast: 0.2s ease;
      --transition-smooth: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    body {
      font-family: var(--font-body);
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Background */
    .bg-scene {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .firefly {
      position: absolute;
      width: 4px; height: 4px;
      background: var(--accent-gold);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent-gold), 0 0 16px var(--accent-gold);
      opacity: 0;
      animation: fireflyGlow 5s infinite ease-in-out;
    }
    .firefly:nth-child(1) { left: 10%; top: 30%; animation-delay: 0s; }
    .firefly:nth-child(2) { left: 80%; top: 20%; animation-delay: 1.5s; }
    .firefly:nth-child(3) { left: 50%; top: 70%; animation-delay: 3s; }
    .firefly:nth-child(4) { left: 30%; top: 50%; animation-delay: 2s; }
    .firefly:nth-child(5) { left: 70%; top: 80%; animation-delay: 4s; }

    @keyframes fireflyGlow {
      0%, 100% { opacity: 0; transform: translate(0, 0); }
      30%      { opacity: 0.8; transform: translate(10px, -15px); }
      60%      { opacity: 0.4; transform: translate(-8px, -25px); }
      80%      { opacity: 0.7; transform: translate(5px, -10px); }
    }

    .ambient-glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .glow-1 {
      width: 400px; height: 400px;
      background: var(--glow-green);
      top: -100px; left: -50px;
      animation: glowPulse 6s infinite ease-in-out;
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(1.1); }
    }

    /* Characters */
    .character {
      position: fixed;
      font-size: 2rem;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
      animation: characterFloat 6s infinite ease-in-out;
    }
    .char-1 { bottom: 40px; left: 40px; }
    .char-2 { bottom: 40px; right: 40px; animation-delay: 1s; font-size: 2.5rem; }

    @keyframes characterFloat {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    /* Navbar */
    .navbar {
      position: relative;
      z-index: 10;
      padding: 20px 24px;
    }
    .logo {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      text-decoration: none;
    }
    .logo span { color: var(--accent-green); }

    /* Main content */
    .login-wrapper {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-container {
      width: 100%;
      max-width: 440px;
    }

    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border-leaf);
      border-radius: var(--radius-xl);
      padding: 40px 36px;
      box-shadow: var(--shadow-card);
      position: relative;
      overflow: hidden;
    }
    .auth-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-green), var(--accent-sage));
    }

    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-emoji {
      font-size: 2.5rem;
      margin-bottom: 16px;
      display: block;
    }
    .auth-title {
      font-family: var(--font-heading);
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .auth-subtitle {
      font-size: 0.95rem;
      color: var(--text-secondary);
    }

    /* Tabs */
    .auth-tabs {
      display: flex;
      gap: 4px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: var(--radius-md);
      padding: 4px;
      margin-bottom: 28px;
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-muted);
      background: transparent;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: var(--font-body);
      transition: all 0.3s ease;
    }
    .auth-tab.active {
      background: rgba(124, 184, 124, 0.15);
      color: var(--accent-green);
    }
    .auth-tab:hover:not(.active) {
      color: var(--text-secondary);
    }

    /* Forms */
    .auth-form { display: none; }
    .auth-form.active { display: block; }

    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
      letter-spacing: 0.03em;
    }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s ease;
    }
    .form-input::placeholder {
      color: var(--text-muted);
    }
    .form-input:focus {
      border-color: var(--accent-green);
      box-shadow: 0 0 0 3px rgba(124, 184, 124, 0.1);
      background: rgba(255, 255, 255, 0.06);
    }

    .form-hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent-green), #5a9e5a);
      color: var(--bg-primary);
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      margin-top: 8px;
      box-shadow: 0 4px 15px rgba(124, 184, 124, 0.3);
      position: relative;
      overflow: hidden;
    }
    .btn-submit::after {
      content: "";
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.5s ease, height 0.5s ease;
    }
    .btn-submit:active::after {
      width: 400px; height: 400px;
    }
    .btn-submit:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 8px 25px rgba(124, 184, 124, 0.4);
    }
    .btn-submit:active {
      transform: translateY(0) scale(0.99);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border-subtle);
    }
    .divider-text {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .social-login {
      display: flex;
      gap: 12px;
    }
    .social-btn {
      flex: 1;
      padding: 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .social-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--border-leaf);
      transform: translateY(-2px);
    }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .auth-footer a {
      color: var(--accent-green);
      text-decoration: none;
      font-weight: 500;
    }
    .auth-footer a:hover {
      text-decoration: underline;
    }

    /* Welcome message */
    .welcome-note {
      text-align: center;
      margin-top: 24px;
      padding: 16px;
      background: rgba(124, 184, 124, 0.05);
      border: 1px solid var(--border-leaf);
      border-radius: var(--radius-md);
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-style: italic;
    }

    @media (max-width: 480px) {
      .auth-card { padding: 32px 24px; }
      .auth-title { font-size: 1.5rem; }
      .character { display: none; }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="bg-scene">
    <div class="firefly"></div>
    <div class="firefly"></div>
    <div class="firefly"></div>
    <div class="firefly"></div>
    <div class="firefly"></div>
  </div>
  <div class="ambient-glow glow-1"></div>
  <div class="character char-1">🐱</div>
  <div class="character char-2">🪴</div>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="logo">Media<span>Nest</span></a>
  </nav>

  <!-- Auth -->
  <div class="login-wrapper">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <span class="auth-emoji">🏡</span>
          <h1 class="auth-title">Welcome home</h1>
          <p class="auth-subtitle">Enter your cozy media space</p>
        </div>

        <!-- Tabs -->
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Log in</button>
          <button class="auth-tab" data-tab="signup">Create account</button>
        </div>

        <!-- Login Form -->
        <form class="auth-form active" id="loginForm">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" placeholder="Your password" required />
          </div>
          <button type="submit" class="btn-submit">🌿 Enter your space</button>

          <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">or continue with</span>
            <div class="divider-line"></div>
          </div>

          <div class="social-login">
            <button type="button" class="social-btn">🔵 Google</button>
            <button type="button" class="social-btn">⚫ GitHub</button>
          </div>
        </form>

        <!-- Signup Form -->
        <form class="auth-form" id="signupForm">
          <div class="form-group">
            <label class="form-label">What should we call you?</label>
            <input type="text" class="form-input" placeholder="Your display name" required />
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" placeholder="Create a password" required />
            <p class="form-hint">At least 8 characters</p>
          </div>
          <button type="submit" class="btn-submit">🌱 Create your space</button>

          <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">or continue with</span>
            <div class="divider-line"></div>
          </div>

          <div class="social-login">
            <button type="button" class="social-btn">🔵 Google</button>
            <button type="button" class="social-btn">⚫ GitHub</button>
          </div>
        </form>

        <div class="welcome-note">
          "A quiet place for the films, books, and songs that stay with you." 🍃
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    // Tab switching
    const tabs = document.querySelectorAll('.auth-tab');
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');

    tabs.forEach((tab) => {
      tab.addEventListener('click', () => {
        tabs.forEach((t) => t.classList.remove('active'));
        tab.classList.add('active');

        if (tab.dataset.tab === 'login') {
          loginForm.classList.add('active');
          signupForm.classList.remove('active');
        } else {
          signupForm.classList.add('active');
          loginForm.classList.remove('active');
        }
      });
    });

    // Handle hash for direct signup link
    if (window.location.hash === '#signup') {
      tabs.forEach((t) => t.classList.remove('active'));
      document.querySelector('[data-tab="signup"]').classList.add('active');
      loginForm.classList.remove('active');
      signupForm.classList.add('active');
    }

    // Form submission — redirect to home
    loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email    = loginForm.querySelector('[type=email]').value;
    const password = loginForm.querySelector('[type=password]').value;
    try {
      const { token, username } = await Auth.login({ email, password });
      setAuth(token, username);
      window.location.href = 'home.html';
    } catch (err) {
      alert(err.message);
    }
  });

  signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = signupForm.querySelectorAll('input')[0].value;
    const email    = signupForm.querySelectorAll('input')[1].value;
    const password = signupForm.querySelectorAll('input')[2].value;
    try {
      const { token, username: u } = await Auth.register({ email, username, password });
      setAuth(token, u);
      window.location.href = 'home.html';
    } catch (err) {
      alert(err.message);
    }
  });
  </script>
</body>
</html>
